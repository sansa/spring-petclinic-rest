name: Energy Measurement & Regression

on:
  push:
    branches: [ master ]
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:
    inputs:
      update_baseline:
        description: 'Force a baseline update (N averaged runs committed back to repo)'
        type: boolean
        default: false
      baseline_runs:
        description: 'Number of runs to average for the baseline (default: 3)'
        type: string
        default: '3'

env:
  BASELINE_RUNS: ${{ inputs.baseline_runs || '3' }}

jobs:
  energy:
    name: Measure & Analyse Energy
    runs-on: ubuntu-latest

    permissions:
      contents: write        # commit updated baseline on master
      pull-requests: write   # post PR comment

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to push baseline commit

      # -----------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-energy.txt

      - name: Install Python dependencies
        run: pip install -r requirements-energy.txt

      # =======================================================================
      # PHASE 1 — single measurement run (all triggers)
      # Used for the regression comparison on this push/PR.
      # =======================================================================

      - name: '[Phase 1] Measure energy — tests'
        run: python measure_energy.py tests

      - name: '[Phase 1] Measure energy — startup'
        run: python measure_energy.py startup --profile h2,spring-data-jpa

      - name: '[Phase 1] Measure energy — endpoints'
        run: python measure_energy.py endpoints --profile h2,spring-data-jpa --requests 200 --warmup 10

      # -----------------------------------------------------------------------
      - name: Run regression analysis
        id: regression
        continue-on-error: true   # post comment + upload artifact before failing
        run: |
          python energy_regression.py \
            --output-md energy-report.md \
            --warn-threshold 0.50 \
            --fail-threshold 1.00

      # -----------------------------------------------------------------------
      - name: Post / update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('energy-report.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Energy Regression Report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: report,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report,
              });
            }

      # -----------------------------------------------------------------------
      - name: Upload measurement artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codecarbon-results-${{ github.run_id }}
          path: |
            codecarbon-results/tests_history.csv
            codecarbon-results/startup_history.csv
            codecarbon-results/endpoints_history.csv
            energy-report.md
          retention-days: 90

      # =======================================================================
      # PHASE 2 — averaged baseline capture (master push or manual dispatch only)
      #
      # Runs N additional measurements so the last BASELINE_RUNS rows in each
      # CSV are all from this CI job on this runner hardware.  The regression
      # script then averages those rows into a stable mean ± σ baseline.
      #
      # Only executed when Phase 1 regression check PASSED (no regressions on
      # the code being merged).
      # =======================================================================

      - name: '[Phase 2] Capture baseline — run ${{ env.BASELINE_RUNS }}x measurements'
        if: |
          steps.regression.outcome == 'success' &&
          (
            (github.event_name == 'push'             && github.ref == 'refs/heads/master') ||
            (github.event_name == 'workflow_dispatch' && inputs.update_baseline == true)
          )
        run: |
          RUNS=${{ env.BASELINE_RUNS }}
          # Phase 1 already gave us 1 run; do (RUNS-1) more so we have RUNS total
          EXTRA=$(( RUNS - 1 ))
          echo "Running $EXTRA additional measurement(s) to reach $RUNS total..."
          for i in $(seq 1 $EXTRA); do
            echo "--- Baseline run $((i + 1)) / $RUNS ---"
            python measure_energy.py tests
            python measure_energy.py startup --profile h2,spring-data-jpa
            python measure_energy.py endpoints --profile h2,spring-data-jpa --requests 200 --warmup 10
          done

      - name: '[Phase 2] Compute mean ± σ and commit baseline'
        if: |
          steps.regression.outcome == 'success' &&
          (
            (github.event_name == 'push'             && github.ref == 'refs/heads/master') ||
            (github.event_name == 'workflow_dispatch' && inputs.update_baseline == true)
          )
        run: |
          python energy_regression.py \
            --update-baseline \
            --runs ${{ env.BASELINE_RUNS }}

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add codecarbon-baseline.json
          git diff --staged --quiet || \
            git commit -m "chore: update energy baseline (n=${{ env.BASELINE_RUNS }}, runner=ubuntu-latest) [skip ci]"
          git push

      # -----------------------------------------------------------------------
      # Fail the job last — after comment and artifact upload have completed.
      - name: Fail on energy regression
        if: steps.regression.outcome == 'failure'
        run: |
          echo "❌ Energy regression detected — see the report above or the PR comment."
          exit 1
